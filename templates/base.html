<!-- 
    TODO: Completar el template base del portal.

    Requisitos:
    - Estructura HTML5 válida (<!DOCTYPE html>, <html>, <head>, <body>)
    - En <title>: mostrar el nombre del sitio (podés hardcodearlo o usar una variable)
    - Un <header> visible con el nombre del portal
    - Una navegación (<nav>) con dos links:
        - Inicio → {% url 'publicaciones:inicio' %}
        - Publicaciones → {% url 'publicaciones:lista_publicaciones' %}
    - Un bloque de contenido para que los templates hijos inserten su HTML:
        {% block content %}{% endblock %}
    - Un <footer> simple (puede ser solo un texto)

    Pista para el bloque de contenido:
        <main>
            {% block content %}
            {% endblock %}
        </main>
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Publicaciones</title>
</head>
<body>

    <header>
        <h1>Portal de Publicaciones UNTDF</h1>
        <nav>
            <ul>
                <li><a href="{% url 'publicaciones:inicio' %}">Inicio</a></li>
                <li><a href="{% url 'publicaciones:lista_publicaciones' %}">Publicaciones</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 - Laboratorio de Programación</p>
    </footer>

</body>
</html>
