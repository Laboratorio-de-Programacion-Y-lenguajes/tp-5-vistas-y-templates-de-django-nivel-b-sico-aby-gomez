<!-- 
    TODO: Completar el template de detalle de publicación.

    Requisitos:
    - Extender base.html
    - Sobreescribir {% block content %}
    - Dentro del bloque mostrar:
        - Título: {{ publicacion.titulo }}
        - Autor: {{ publicacion.autor }}
        - Fecha de publicación: {{ publicacion.fecha_publicacion }}
        - Contenido completo: {{ publicacion.contenido }}
        - Un link para volver al listado usando {% url 'publicaciones:lista_publicaciones' %}

    Pista para el link de vuelta:
        <a href="{% url 'publicaciones:lista_publicaciones' %}">← Volver al listado</a>
-->

{% extends 'base.html' %}

{% block content %}
    <article class="publicacion-detalle">
        <h1>{{ publicacion.titulo }}</h1>
        
        <div class="publicacion-meta">
            <p><strong>Autor:</strong> {{ publicacion.autor }}</p>
            <p><small>Publicado el: {{ publicacion.fecha_publicacion }}</small></p>
        </div>
        
        <hr>

        <div class="publicacion-cuerpo">
            <p>{{ publicacion.contenido }}</p>
        </div>
    </article>

    <hr>

    <p>
        <a href="{% url 'publicaciones:lista_publicaciones' %}">← Volver al listado</a>
    </p>
{% endblock %}
